<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>La French Piscine — Proposition stratégique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#0B2545;--deep-light:#163A5F;--slate:#4B5563;--slate-light:#8B95A2;
  --pool:#0C7BB3;--pool-light:#3DA5D9;--pool-dark:#095E8A;--pool-pale:#E8F4FB;
  --sand:#A3927F;--sand-light:#C4B5A5;--sand-dark:#8A7D6C;--sand-pale:#F5F0EB;
  --bg:#F7F9FB;--bg-warm:#FAF8F5;--white:#FFFFFF;--text:#374151;
  --green:#059669;--green-bg:#ECFDF5;--red:#DC2626;--red-bg:#FEF2F2;
  --orange:#D97706;--orange-bg:#FFFBEB;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);color:var(--text);background:var(--bg);line-height:1.6;font-size:16px;overflow-x:hidden}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--deep) 0%,#0D3B66 100%);transition:opacity .6s var(--ease),visibility .6s}
.login-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-card{background:var(--white);border-radius:16px;padding:48px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 25px 50px -12px rgba(0,0,0,.4)}
.login-logo{font-family:var(--serif);font-size:26px;color:var(--deep);margin-bottom:4px}
.login-sub{color:var(--slate-light);font-size:14px;margin-bottom:32px}
.login-field{position:relative;margin-bottom:16px}
.login-field input{width:100%;padding:14px 18px;border:2px solid #E2E8F0;border-radius:10px;font-family:var(--sans);font-size:16px;transition:border-color .2s;outline:none;-webkit-appearance:none}
.login-field input:focus{border-color:var(--pool)}
.login-field input.error{border-color:var(--red);animation:shake .4s}
.login-btn{width:100%;padding:14px;background:var(--pool);color:var(--white);border:none;border-radius:10px;font-family:var(--sans);font-size:16px;font-weight:500;cursor:pointer;transition:background .2s,transform .1s}
.login-btn:hover{background:var(--pool-dark)}
.login-btn:active{transform:scale(.98)}
.login-error{color:var(--red);font-size:13px;margin-top:8px;min-height:20px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* CONTENT */
.proposal{display:none;opacity:0;transition:opacity .8s var(--ease)}
.proposal.visible{display:block;opacity:1}
.container{max-width:960px;margin:0 auto;padding:0 24px}

/* HERO */
.hero{background:linear-gradient(135deg,var(--deep) 0%,#0D3B66 100%);color:var(--white);padding:80px 0 64px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to top,rgba(11,37,69,.3),transparent);pointer-events:none}
.hero-badge{display:inline-block;background:rgba(163,146,127,.25);color:var(--sand-light);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:6px 16px;border-radius:100px;margin-bottom:24px}
.hero h1{font-family:var(--serif);font-size:clamp(30px,5vw,48px);line-height:1.15;font-weight:400;margin-bottom:20px;letter-spacing:-.02em}
.hero h1 .accent{color:var(--pool-light)}
.hero-subtitle{max-width:620px;margin:0 auto 28px;color:rgba(255,255,255,.7);font-size:17px;line-height:1.65}
.hero-intro{max-width:620px;margin:0 auto 28px;color:rgba(255,255,255,.85);font-family:var(--serif);font-size:clamp(22px,3.5vw,30px);font-weight:400;line-height:1.3;letter-spacing:-.01em}
.hero-checkpoints{max-width:620px;margin:0 auto 32px;text-align:left;display:grid;gap:14px}
.hero-checkpoint{display:flex;align-items:flex-start;gap:14px;color:rgba(255,255,255,.8);font-size:15px;line-height:1.6}
.hero-checkpoint strong{color:var(--white)}
.checkpoint-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(61,165,217,.25);color:var(--pool-light);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px}
.hero-meta{color:rgba(255,255,255,.5);font-size:14px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.hero-meta .sep{color:rgba(255,255,255,.25)}

/* SECTION COMMON */
section{padding:72px 0}
h2{font-family:var(--serif);font-size:clamp(26px,3.5vw,36px);font-weight:400;margin-bottom:12px;letter-spacing:-.015em;color:var(--deep)}
.section-intro{color:var(--slate-light);font-size:17px;margin-bottom:40px;max-width:680px}

/* CONSTAT */
.audit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:40px}
.audit-item{display:flex;align-items:flex-start;gap:12px;padding:16px;border-radius:10px;background:var(--white);border:1px solid #E5E7EB}
.audit-item.fail{border-left:4px solid var(--red)}
.audit-item.warn{border-left:4px solid var(--orange)}
.audit-item.pass{border-left:4px solid var(--green)}
.audit-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.audit-item.fail .audit-icon{background:var(--red-bg);color:var(--red)}
.audit-item.warn .audit-icon{background:var(--orange-bg);color:var(--orange)}
.audit-item.pass .audit-icon{background:var(--green-bg);color:var(--green)}
.audit-label{font-size:14px;font-weight:500;color:var(--deep);margin-bottom:2px}
.audit-detail{font-size:13px;color:var(--slate-light);line-height:1.5}
.insight-box{display:flex;gap:20px;background:var(--pool-pale);border-left:4px solid var(--pool);border-radius:0 12px 12px 0;padding:28px}
.insight-box.sand{background:var(--sand-pale);border-left-color:var(--sand)}
.insight-icon{flex-shrink:0;color:var(--pool);margin-top:2px}
.insight-box.sand .insight-icon{color:var(--sand-dark)}
.insight-box p{font-size:15px;line-height:1.7;margin-bottom:8px}
.insight-box p:last-child{margin-bottom:0}
.insight-highlight{font-weight:600;color:var(--deep);font-size:16px !important}

/* DETAIL AUDIT */
.detail-section{background:var(--white)}
.category{margin-bottom:48px}
.category:last-child{margin-bottom:0}
.cat-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.cat-header h3{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--deep)}
.cat-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:100px;letter-spacing:.02em}
.cat-badge.critical{background:var(--red-bg);color:var(--red)}
.cat-badge.warning{background:var(--orange-bg);color:var(--orange)}
.cat-badge.ok{background:var(--green-bg);color:var(--green)}
.finding{background:var(--bg);border:1px solid #E5E7EB;border-radius:10px;padding:20px;margin-bottom:12px}
.finding-title{font-weight:600;color:var(--deep);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.finding-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.finding-title .dot.red{background:var(--red)}
.finding-title .dot.orange{background:var(--orange)}
.finding-title .dot.green{background:var(--green)}
.finding p{font-size:14px;color:var(--slate);line-height:1.6;margin-bottom:4px}
.finding p:last-child{margin-bottom:0}
.finding code{background:#E5E7EB;padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono',Consolas,monospace}
.finding ul{margin:8px 0 4px 20px;font-size:14px;color:var(--slate);line-height:1.8}

/* ATOUTS */
.atouts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px}
.atout-card{background:var(--white);border:1px solid #E5E7EB;border-radius:12px;padding:28px 24px;text-align:center}
.atout-number{font-family:var(--serif);font-size:42px;color:var(--pool);line-height:1;margin-bottom:8px}
.atout-label{font-weight:600;color:var(--deep);margin-bottom:4px}
.atout-desc{font-size:13px;color:var(--slate-light);line-height:1.5}
.realisations-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:32px}
.realisation{background:var(--white);border:1px solid #E5E7EB;border-radius:10px;padding:18px 20px}
.realisation-ville{font-weight:700;color:var(--pool);font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.realisation-type{font-weight:500;color:var(--deep);margin-bottom:4px}
.realisation-detail{font-size:13px;color:var(--slate-light);line-height:1.5}

/* KEYWORDS TABLE */
.keywords-table{margin-bottom:16px;overflow-x:auto}
.keywords-table table{width:100%;border-collapse:collapse;font-size:14px}
.keywords-table thead{background:var(--bg)}
.keywords-table th{text-align:left;padding:10px 14px;font-weight:600;color:var(--deep);border-bottom:2px solid #E2E8F0;font-size:13px;text-transform:uppercase;letter-spacing:.03em}
.keywords-table td{padding:10px 14px;border-bottom:1px solid #E5E7EB;color:var(--slate);line-height:1.5}
.keywords-table tr:last-child td{border-bottom:none}
.keywords-table tr:hover{background:var(--pool-pale)}

/* PRICE INLINE */
.price-inline{display:flex;align-items:baseline;gap:16px;margin-bottom:40px;flex-wrap:wrap}
.price-inline-amount{font-family:var(--serif);font-size:clamp(32px,5vw,42px);color:var(--pool);letter-spacing:-.02em;font-weight:400}
.price-inline-detail{font-size:15px;color:var(--slate-light)}

/* TRANSFORMATION */
.transform-section{background:linear-gradient(180deg,var(--pool-pale) 0%,#F0F7FB 100%);padding:72px 0;border-top:1px solid rgba(12,123,179,.1);border-bottom:1px solid rgba(12,123,179,.1)}
.transform-grid{display:grid;gap:0;margin-bottom:48px;border-radius:16px;overflow:hidden;border:1px solid #E2E8F0}
.transform-header{display:grid;grid-template-columns:1fr 1fr;background:var(--deep)}
.transform-header-cell{padding:16px 28px;font-family:var(--serif);font-size:18px;font-weight:400;letter-spacing:.02em}
.transform-header-cell.before{color:rgba(255,255,255,.5)}
.transform-header-cell.after{color:var(--pool-light)}
.transform-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #F0F0F0;transition:background .15s}
.transform-row:last-child{border-bottom:none}
.transform-row{background:var(--white)}
.transform-row:hover{background:#FAFBFC}
.transform-cell{padding:18px 28px;font-size:14px;line-height:1.55}
.transform-cell.before{color:var(--slate-light);position:relative}
.transform-cell.before::before{content:'';position:absolute;left:0;top:18px;bottom:18px;width:3px;background:var(--red);opacity:.3;border-radius:0 2px 2px 0}
.transform-cell.after{color:var(--deep);position:relative}
.transform-cell.after::before{content:'';position:absolute;left:0;top:18px;bottom:18px;width:3px;background:var(--green);opacity:.4;border-radius:0 2px 2px 0}
.transform-cell.after strong{color:var(--pool-dark);font-weight:600}
.transform-cell .t-title{font-weight:600;margin-bottom:2px}
.transform-cell .t-detail{font-size:13px;color:var(--slate-light);line-height:1.5}
.transform-cell.after .t-detail{color:var(--slate)}
.transform-arrow{display:none}
.price-block{background:var(--deep);border-radius:16px;padding:40px 36px;display:grid;gap:20px}
.price-option-badge{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--pool);color:var(--white);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center}
.price-option-header{display:flex;align-items:flex-start;gap:14px;color:rgba(255,255,255,.85);font-size:16px;line-height:1.55;margin-bottom:20px}
.price-option-header strong{color:var(--white);font-size:18px}
.price-benefits{list-style:none;padding:0;margin:0;display:grid;gap:10px}
.price-benefits li{display:flex;align-items:flex-start;gap:10px;color:rgba(255,255,255,.7);font-size:14px;line-height:1.55}
.price-benefits li::before{content:'\2713';flex-shrink:0;color:var(--pool-light);font-weight:700;margin-top:1px}
.price-benefits li:last-child{color:var(--pool-light);font-weight:500}
.price-benefits li:last-child::before{content:'\221E'}

/* FOOTER */
footer{padding:40px 0;text-align:center;border-top:1px solid #E2E8F0;color:var(--slate-light);font-size:13px}
footer p{margin-bottom:4px}
.footer-sub{font-style:italic;font-size:12px}

/* RESPONSIVE */
@media(max-width:768px){
  .audit-grid{grid-template-columns:1fr}
  .atouts-grid{grid-template-columns:1fr}
  .realisations-grid{grid-template-columns:1fr}
  .hero{padding:56px 0 48px}
  .insight-box{flex-direction:column;gap:12px}
  .login-card{padding:36px 28px}
  .transform-header{grid-template-columns:1fr}
  .transform-header-cell.before{display:none}
  .transform-row{grid-template-columns:1fr;gap:0}
  .transform-cell{padding:14px 20px}
  .transform-cell.before{background:#FEF2F2;border-bottom:none;padding-bottom:10px}
  .transform-cell.before::before{display:none}
  .transform-cell.after{padding-top:10px;border-bottom:1px solid #F0F0F0}
  .transform-arrow{display:block;text-align:center;font-size:16px;color:var(--pool);padding:2px 0;background:var(--white)}
  .price-block{padding:32px 22px}
  .price-option-header{flex-direction:column;gap:10px}
}
@media(max-width:480px){
  .hero-meta{flex-direction:column;gap:4px}
  .hero-meta .sep{display:none}
  .cat-header{flex-direction:column;gap:8px;align-items:flex-start}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
  html{scroll-behavior:auto}
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">La French Piscine</div>
    <p class="login-sub">Document confidentiel — Accès protégé</p>
    <form id="loginForm" autocomplete="off">
      <div class="login-field">
        <input type="password" id="passwordInput" placeholder="Mot de passe" autofocus aria-label="Mot de passe">
      </div>
      <button type="submit" class="login-btn">Accéder à la proposition</button>
      <p class="login-error" id="loginError" aria-live="polite"></p>
    </form>
  </div>
</div>

<script>
(function(){
  const form=document.getElementById('loginForm'),input=document.getElementById('passwordInput'),error=document.getElementById('loginError'),screen=document.getElementById('loginScreen'),proposal=document.getElementById('proposal'),payloadEl=document.getElementById('encryptedPayload');
  function b64(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a}
  async function decrypt(p){
    const d=JSON.parse(payloadEl.textContent),salt=b64(d.salt),iv=b64(d.iv),tag=b64(d.tag),data=b64(d.data);
    const c=new Uint8Array(data.length+tag.length);c.set(data);c.set(tag,data.length);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);
    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv},k,c));
  }
  form.addEventListener('submit',async function(e){
    e.preventDefault();const p=input.value.trim();if(!p){input.focus();return}
    try{const h=await decrypt(p);proposal.innerHTML=h;proposal.classList.add('visible');screen.classList.add('hidden')}
    catch(err){error.textContent='Mot de passe incorrect';input.classList.add('error');input.value='';input.focus();setTimeout(()=>{input.classList.remove('error');error.textContent=''},2000)}
  });
})();
</script>
